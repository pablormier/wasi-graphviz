name: Build WASM Artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      graphviz_version:
        description: "Graphviz version to build (e.g. 14.1.5)"
        required: false
        default: "14.1.5"

env:
  GRAPHVIZ_VERSION: ${{ github.event.inputs.graphviz_version || '14.1.5' }}

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.2
          cache: true

      - name: Verify build tools
        run: |
          pixi run zig version
          pixi run cmake --version
          pixi run bison --version
          pixi run flex --version
          pixi run wasm-objdump --version
          pixi run wasm-strip --version
          pixi run wasm-opt --version

      - name: Build graphviz.wasm
        run: pixi run build-wasm --graphviz-version "${GRAPHVIZ_VERSION}"

      - name: Report artifact size
        run: |
          ls -lh build/graphviz.wasm
          pixi run wasm-objdump -h build/graphviz.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphviz-wasm-${{ env.GRAPHVIZ_VERSION }}-${{ github.ref_name }}
          path: build/graphviz.wasm
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/graphviz.wasm
          body: |
            Graphviz WASM artifact for version ${{ env.GRAPHVIZ_VERSION }}

            Built with zig targeting wasm32-wasi.
            Exports: graphviz_render, graphviz_free, graphviz_last_error, graphviz_version, malloc, free.

            Install the Python package:
            ```bash
            pip install wasi-graphviz[all]==${{ github.ref_name }}
            ```
