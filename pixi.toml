[workspace]
name = "wasi-graphviz"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[activation.env]
# bison's compiled-in pkgdatadir bakes the absolute path of the pixi env at
# install time, so a renamed/moved project dir breaks `bison` until reinstall.
# Pin it to the live env path so builds survive directory renames.
BISON_PKGDATADIR = "$PIXI_PROJECT_ROOT/.pixi/envs/default/share/bison"

[tasks]
build-wasm = "python scripts/build_wasm.py"
validate-wasm = "wasm-objdump -x build/graphviz.wasm"
test = "pytest"

[dependencies]
python = ">=3.11"
zig = "*"
cmake = "*"
ninja = "*"
pkg-config = "*"
wabt = "*"
binaryen = "*"
vcpkg = ">=2023.4.15,<2024"
bison = ">=3.8.2,<4"
flex = ">=2.6.4,<3"
